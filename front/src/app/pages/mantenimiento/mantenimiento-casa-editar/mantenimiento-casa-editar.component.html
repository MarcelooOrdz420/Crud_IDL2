<div class="card border-0">
  <div class="card-header bg-white">
    <h3 class="h5 mb-0">{{ modo() === 'editar' ? 'Editar casa' : 'Agregar casa' }}</h3>
  </div>

  <div class="card-body">
    <form [formGroup]="form" class="row g-3" (ngSubmit)="onGuardar()">
      <div class="col-12 col-md-6">
        <label for="nombre" class="form-label">Nombre</label>
        <input id="nombre" type="text" class="form-control" formControlName="nombre" />
        @if (form.controls.nombre.touched && form.controls.nombre.invalid) {
        <div class="invalid-feedback d-block">El nombre es obligatorio.</div>
        }
      </div>

      <div class="col-12 col-md-6">
        <label for="idPropietarioPersona" class="form-label">Id Propietario (Persona)</label>
        <input id="idPropietarioPersona" type="number" class="form-control" formControlName="idPropietarioPersona" />
      </div>

      <div class="col-12">
        <label for="direccion" class="form-label">Dirección</label>
        <input id="direccion" type="text" class="form-control" formControlName="direccion" />
      </div>

      <div class="col-12">
        <label for="referencia" class="form-label">Referencia</label>
        <input id="referencia" type="text" class="form-control" formControlName="referencia" />
      </div>

      <div class="col-12 d-flex justify-content-end gap-2 mt-2">
        <button type="button" class="btn btn-outline-secondary" (click)="onCancelar()">Cancelar</button>
        <button type="submit" class="btn btn-primary" [disabled]="cargando">{{ cargando ? 'Guardando...' : 'Guardar' }}</button>
      </div>
    </form>
  </div>
</div>
